[build]
  base = "wyrd"
  command = "bun install && bun run build:web"
  publish = "wyrd/apps/web/dist"

[build.environment]
  BUN_VERSION = "1.3.10"

# SPA fallback for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Don't cache index.html
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
