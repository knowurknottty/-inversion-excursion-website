<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <linearGradient id="mudraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0a0f;stop-opacity:1" />
    </linearGradient>
    
    <filter id="mudraGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  
  <!-- Background -->
  <rect width="800" height="800" fill="url(#mudraBg)"/>
  
  
  <!-- Hand circle guide -->
  <circle cx="400" cy="400" r="300" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.15"/>
  
  <circle cx="400" cy="400" r="250" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.1"/>
  
  
  <!-- Gyan Mudrā visualization -->
  <g transform="translate(400, 400)" filter="url(#mudraGlow)">
    <!-- Palm base -->
    <ellipse cx="0" cy="80" rx="70" ry="40" fill="#2d2415" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
    
    
    <!-- Fingers -->
    <!-- Index finger (touching thumb) -->
    <path d="M -20 60 Q -25 20 -15 -40" fill="none" stroke="#c9a227" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Thumb (touching index) -->
    <path d="M 20 60 Q 25 20 15 -30" fill="none" stroke="#c9a227" stroke-width="12" stroke-linecap="round" opacity="0.6"/>
    
    
    <!-- Contact circle -->
    <circle cx="0" cy="-35" r="18" fill="none" stroke="#c9a227" stroke-width="3" opacity="0.8" filter="url(#mudraGlow)"/>
    
    
    <!-- Middle finger (extended) -->
    <path d="M -5 60 Q -8 10 -5 -80" fill="none" stroke="#8b6914" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    
    
    <!-- Ring finger (extended) -->
    <path d="M 5 60 Q 8 10 5 -70" fill="none" stroke="#8b6914" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    
    
    <!-- Pinky (extended) -->
    <path d="M 15 60 Q 20 15 20 -50" fill="none" stroke="#8b6914" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    
    
    <!-- Energy glow around contact point -->
    <circle cx="0" cy="-35" r="40" fill="url(#mudraGlow)" opacity="0.2"/>
  </g>
  
  
  <!-- Decorative frame -->
  <rect x="50" y="50" width="700" height="700" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.2"/>
  
  <rect x="70" y="70" width="660" height="660" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.1"/>
  
  
  <!-- Corner marks -->
  <circle cx="50" cy="50" r="5" fill="#c9a227" opacity="0.3"/>
  
  <circle cx="750" cy="50" r="5" fill="#c9a227" opacity="0.3"/>
  
  <circle cx="50" cy="750" r="5" fill="#c9a227" opacity="0.3"/>
  
  <circle cx="750" cy="750" r="5" fill="#c9a227" opacity="0.3"/>
  
  
  <!-- Text -->
  <text x="400" y="680" text-anchor="middle" font-family="serif" font-size="24" fill="#c9a227" opacity="0.5">GYAN MUDRĀ</text>
  
  <text x="400" y="715" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#a0a0ac" opacity="0.4">Touch of Direct Knowing</text>
  
  <text x="400" y="745" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#606070" opacity="0.4">See image-prompts.md</text>
</svg>
