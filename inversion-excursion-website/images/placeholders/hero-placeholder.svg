<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#12121a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:0.1" />
    </linearGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- Inverted Tower Shape -->
  <g transform="translate(960, 540)" filter="url(#glow)">
    <!-- Tower base (top) -->
    <polygon points="0,-300 -120,-200 120,-200" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
    <!-- Tower body -->
    <polygon points="-120,-200 -80,0 80,0 120,-200" fill="url(#gold)" opacity="0.3"/>
    <polygon points="-120,-200 -80,0 80,0 120,-200" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.6"/>
    <!-- Tower sections (books) -->
    <line x1="-110" y1="-160" x2="110" y2="-160" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
    <line x1="-100" y1="-120" x2="100" y2="-120" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
    <line x1="-90" y1="-80" x2="90" y2="-80" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
    <line x1="-85" y1="-40" x2="85" y2="-40" stroke="#c9a227" stroke-width="1" opacity="0.4"/>
    
    <!-- Doorway/Keyhole at bottom -->
    <polygon points="0,100 -25,0 25,0" fill="#c9a227" opacity="0.2"/>
    <circle cx="0" cy="50" r="15" fill="#c9a227" opacity="0.3" filter="url(#glow)"/>
    
    <!-- Light rays from cracks -->
    <line x1="-100" y1="-180" x2="-150" y2="-220" stroke="#c9a227" stroke-width="3" opacity="0.4"/>
    <line x1="100" y1="-180" x2="150" y2="-220" stroke="#c9a227" stroke-width="3" opacity="0.4"/>
    <line x1="0" y1="-200" x2="0" y2="-280" stroke="#c9a227" stroke-width="4" opacity="0.5"/>
  </g>
  
  <!-- Decorative corner elements -->
  <path d="M 50 50 L 150 50 L 150 60 L 60 60 L 60 150 L 50 150 Z" fill="#c9a227" opacity="0.2"/>
  <path d="M 1870 50 L 1770 50 L 1770 60 L 1860 60 L 1860 150 L 1870 150 Z" fill="#c9a227" opacity="0.2"/>
  <path d="M 50 1030 L 150 1030 L 150 1020 L 60 1020 L 60 930 L 50 930 Z" fill="#c9a227" opacity="0.2"/>
  <path d="M 1870 1030 L 1770 1030 L 1770 1020 L 1860 1020 L 1860 930 L 1870 930 Z" fill="#c9a227" opacity="0.2"/>
  
  <!-- Text placeholder -->
  <text x="960" y="900" text-anchor="middle" font-family="serif" font-size="24" fill="#c9a227" opacity="0.5">HERO IMAGE PLACEHOLDER</text>
  <text x="960" y="940" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#a0a0ac" opacity="0.4">Generate with AI: See image-prompts.md</text>
</svg>
