<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="bossBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121a;stop-opacity:1" />
    </linearGradient>
    
    <filter id="bossGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="1600" fill="url(#bossBg)"/>
  
  <!-- Boss silhouette placeholder -->
  <g transform="translate(600, 800)" filter="url(#bossGlow)">
    <!-- Head -->
    <circle cx="0" cy="-300" r="80" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.5"/>
    
    <!-- Body -->
    <path d="M -60 -220 L -100 200 L 100 200 L 60 -220 Z" fill="#1a1a24" stroke="#c9a227" stroke-width="2" opacity="0.4"/>
    
    <!-- Eyes -->
    <circle cx="-25" cy="-310" r="15" fill="#22c55e" opacity="0.6" filter="url(#bossGlow)"/>
    <circle cx="25" cy="-310" r="15" fill="#22c55e" opacity="0.6" filter="url(#bossGlow)"/>
    
    <!-- Dollar signs in eyes -->
    <text x="-25" y="-305" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#0a0a0f" font-weight="bold" opacity="0.8">$</text>
    <text x="25" y="-305" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#0a0a0f" font-weight="bold" opacity="0.8">$</text>
    
    <!-- Chains around body -->
    <ellipse cx="0" cy="-150" rx="120" ry="20" fill="none" stroke="#8b6914" stroke-width="4" opacity="0.4"/>
    
    <ellipse cx="0" cy="-100" rx="130" ry="20" fill="none" stroke="#8b6914" stroke-width="4" opacity="0.4"/>
    
    <ellipse cx="0" cy="-50" rx="140" ry="20" fill="none" stroke="#8b6914" stroke-width="4" opacity="0.4"/>
    
    <ellipse cx="0" cy="0" rx="150" ry="20" fill="none" stroke="#8b6914" stroke-width="4" opacity="0.4"/>
    
    <!-- Coin elements -->
    <circle cx="-200" cy="-100" r="40" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.3"/>
    
    <text x="-200" y="-95" text-anchor="middle" font-family="serif" font-size="30" fill="#c9a227" opacity="0.3">$</text>
    
    
    <circle cx="200" cy="-50" r="35" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.3"/>
    
    <text x="200" y="-45" text-anchor="middle" font-family="serif" font-size="26" fill="#c9a227" opacity="0.3">$</text>
    
    
    <circle cx="180" cy="100" r="45" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.25"/>
    
    
    <circle cx="-180" cy="150" r="38" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.25"/>
  </g>
  
  <!-- Decorative frame -->
  <rect x="50" y="50" width="1100" height="1500" fill="none" stroke="#c9a227" stroke-width="2" opacity="0.2"/>
  
  <rect x="70" y="70" width="1060" height="1460" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.1"/>
  
  <!-- Corner ornaments -->
  <path d="M 50 50 L 150 50 L 150 70 L 70 70 L 70 150 L 50 150 Z" fill="#c9a227" opacity="0.15"/>
  
  <path d="M 1150 50 L 1050 50 L 1050 70 L 1130 70 L 1130 150 L 1150 150 Z" fill="#c9a227" opacity="0.15"/>
  
  
  <!-- Text -->
  <text x="600" y="1450" text-anchor="middle" font-family="serif" font-size="32" fill="#c9a227" opacity="0.5">DUNGEON BOSS</text>
  
  <text x="600" y="1490" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#a0a0ac" opacity="0.4">The Corporate Golem • Mint of Chains</text>
  
  <text x="600" y="1530" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#606070" opacity="0.4">See image-prompts.md for AI generation prompt</text>
</svg>
