<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6914;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0f"/>
  
  
  <!-- Inverted Tower / Keyhole symbol -->
  <g transform="translate(50, 50)">
    <!-- Tower outline -->
    <polygon points="0,-40 35,45 20,45 20,10 -20,10 -20,45 -35,45" 
             fill="none" stroke="url(#logoGold)" stroke-width="4" stroke-linejoin="round"/>
    
    
    <!-- Keyhole circle -->
    <circle cx="0" cy="25" r="8" fill="url(#logoGold)"/>
    
    
    <!-- Inner accent line -->
    <polygon points="0,-30 25,35 15,35 15,0 -15,0 -15,35 -25,35" 
             fill="none" stroke="#c9a227" stroke-width="1.5" opacity="0.5"/>
  </g>
  
  
  <!-- Outer ring (optional, for larger sizes) -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c9a227" stroke-width="1" opacity="0.3"/>
</svg>
