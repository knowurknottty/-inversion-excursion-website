# Foundry Configuration
[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
script = "script"

# Solidity version
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Gas reporting
gas_reports = ["TimeToken"]

# Testing
[profile.default.fuzz]
runs = 256
max_test_rejects = 65536

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false

# CI Profile (more extensive testing)
[profile.ci]
fuzz = { runs = 10_000 }
invariant = { runs = 1_000 }
verbosity = 4

# Gas Optimization Profile
[profile.optimized]
optimizer = true
optimizer_runs = 10_000
via_ir = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"
multiline_func_header = "attributes_first"
quote_style = "double"
number_underscore = "preserve"
