[profile.default]
src = "."
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"

# Compiler settings
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

# Remappings
remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "interfaces/=interfaces/"
]

# Testing
verbosity = 3
ffi = false
ast = false

# Gas reporting
gas_reports = ["ReputationRegistry"]
gas_reports_ignore = []

# Fuzzing
fuzz_runs = 256
fuzz_max_local_rejects = 1024
fuzz_max_global_rejects = 65536

# Invariant testing
invariant_runs = 256
invariant_depth = 15
invariant_fail_on_revert = false

[profile.ci]
verbosity = 4
fuzz_runs = 1024
invariant_runs = 1024

[profile.release]
optimizer = true
optimizer_runs = 1000
via_ir = true