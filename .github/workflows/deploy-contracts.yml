name: Contract Deployment

on:
  workflow_dispatch:
    inputs:
      network:
        description: 'Network to deploy to'
        required: true
        default: 'baseSepolia'
        type: choice
        options:
          - baseSepolia
          - base
      verify:
        description: 'Verify contracts on explorer'
        required: false
        default: true
        type: boolean
      dry_run:
        description: 'Dry run (estimate gas only)'
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.network == 'base' && 'production' || 'testnet' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Estimate gas (dry run)
        if: github.event.inputs.dry_run == 'true'
        run: npm run deploy:dry-run -- --network ${{ github.event.inputs.network }}
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BASE_RPC_URL: ${{ github.event.inputs.network == 'base' && secrets.BASE_RPC_URL || secrets.BASE_SEPOLIA_RPC_URL }}

      - name: Deploy contracts
        if: github.event.inputs.dry_run == 'false'
        run: npm run deploy:${{ github.event.inputs.network == 'base' && 'mainnet' || 'testnet' }}
        env:
          PRIVATE_KEY: ${{ github.event.inputs.network == 'base' && secrets.MAINNET_PRIVATE_KEY || secrets.TESTNET_PRIVATE_KEY }}
          BASE_RPC_URL: ${{ github.event.inputs.network == 'base' && secrets.BASE_RPC_URL || secrets.BASE_SEPOLIA_RPC_URL }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}

      - name: Verify contracts
        if: github.event.inputs.verify == 'true' && github.event.inputs.dry_run == 'false'
        run: npm run verify -- --network ${{ github.event.inputs.network }}
        env:
          PRIVATE_KEY: ${{ github.event.inputs.network == 'base' && secrets.MAINNET_PRIVATE_KEY || secrets.TESTNET_PRIVATE_KEY }}
          BASE_RPC_URL: ${{ github.event.inputs.network == 'base' && secrets.BASE_RPC_URL || secrets.BASE_SEPOLIA_RPC_URL }}
          BASESCAN_API_KEY: ${{ secrets.BASESCAN_API_KEY }}

      - name: Upload deployment artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ github.event.inputs.network }}-${{ github.run_number }}
          path: |
            deployments/${{ github.event.inputs.network }}/*.json
            broadcast/*.json

      - name: Update contract addresses in Vercel
        if: github.event.inputs.network == 'base' && github.event.inputs.dry_run == 'false'
        run: |
          DEPLOYMENT_FILE="deployments/base/latest.json"
          if [ -f "$DEPLOYMENT_FILE" ]; then
            echo "Updating Vercel environment variables..."
            
            # Extract contract addresses
            BATTLEGROUND=$(cat $DEPLOYMENT_FILE | jq -r '.contracts.Battleground // empty')
            CELL_REGISTRY=$(cat $DEPLOYMENT_FILE | jq -r '.contracts.CellRegistry // empty')
            CATALYST=$(cat $DEPLOYMENT_FILE | jq -r '.contracts.FrequencyCatalyst // empty')
            
            # Update Vercel env vars
            echo "$BATTLEGROUND" | vercel env add NEXT_PUBLIC_CONTRACT_BATTLEGROUND production --token ${{ secrets.VERCEL_TOKEN }} --yes || true
            echo "$CELL_REGISTRY" | vercel env add NEXT_PUBLIC_CONTRACT_CELL_REGISTRY production --token ${{ secrets.VERCEL_TOKEN }} --yes || true
            echo "$CATALYST" | vercel env add NEXT_PUBLIC_CONTRACT_FREQUENCY_CATALYST production --token ${{ secrets.VERCEL_TOKEN }} --yes || true
            
            # Trigger redeploy to pick up new env vars
            vercel --prod --token ${{ secrets.VERCEL_TOKEN }} --yes
          fi
