<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="towerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c9a227"/>
      <stop offset="100%" style="stop-color:#8b6914"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="12" fill="#0a0a0f"/>
  <!-- Tower shape -->
  <polygon points="50,10 85,85 15,85" fill="url(#towerGradient)"/>
  <!-- Inner detail -->
  <polygon points="50,25 70,75 30,75" fill="#0a0a0f"/>
  <!-- Opening/exit symbol -->
  <rect x="42" y="65" width="16" height="20" fill="url(#towerGradient)"/>
</svg>
